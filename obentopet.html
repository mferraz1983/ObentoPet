const auth = {
  async signIn(email, password) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: "POST",
      headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error_description || data.msg || "Erro ao entrar");
    return data;
  },
  async signOut(token) {
    await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
      method: "POST",
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${token}` }
    });
  },
  async getUser(token) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${token}` }
    });
    if (!r.ok) return null;
    return r.json();
  }
};

function makeDb(token) {
  const headers = {
    "apikey": SUPABASE_KEY,
    "Authorization": `Bearer ${token}`,
    "Content-Type": "application/json",
    "Prefer": "return=representation"
  };
  return {
    async get(table, params = "") {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, { headers });
      if (!r.ok) return [];
      return r.json();
    },
    async upsert(table, data) {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
        method: "POST",
        headers: { ...headers, "Prefer": "resolution=merge-duplicates,return=representation" },
        body: JSON.stringify(data)
      });
      return r.ok;
    },
    async delete(table, filter) {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`, { method: "DELETE", headers });
      return r.ok;
    },
    async insert(table, data) {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
        method: "POST", headers, body: JSON.stringify(data)
      });
      return r.ok;
    }
  };
}

const todayISO = () => new Date().toISOString().split("T")[0];
const weekdayNames = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
const weekdayShort = ["DOM","SEG","TER","QUA","QUI","SEX","SÁB"];
function dateToISO(d) { return d.toISOString().split("T")[0]; }
function formatDateBR(iso) { const [y,m,d] = iso.split("-"); return `${d}/${m}`; }
function addDays(iso, days) {
  const d = new Date(iso + "T00:00:00");
  d.setDate(d.getDate() + days);
  return dateToISO(d);
}
function getOccurrencesInRange(client, startISO, endISO) {
  const out = [];
  const start = new Date(startISO + "T00:00:00");
  const end = new Date(endISO + "T00:00:00");
  if (client.frequency === "avulsa") {
    if (client.nextDate && client.nextDate >= startISO && client.nextDate <= endISO) out.push(client.nextDate);
    return out;
  }
  const intervalDays = { semanal: 7, quinzenal: 14 }[client.frequency];
  if (!client.nextDate) return out;
  if (client.frequency === "mensal") {
    let cursor = new Date(client.nextDate + "T00:00:00");
    while (cursor > start) { const p = new Date(cursor); p.setMonth(p.getMonth()-1); cursor = p; }
    while (cursor <= end) {
      if (cursor >= start) out.push(dateToISO(cursor));
      const n = new Date(cursor); n.setMonth(n.getMonth()+1); cursor = n;
    }
    return out;
  }
  let cursor = client.nextDate;
  while (cursor > startISO) cursor = addDays(cursor, -intervalDays);
  while (cursor <= endISO) { if (cursor >= startISO) out.push(cursor); cursor = addDays(cursor, intervalDays); }
  return out;
}
const frequencyLabel = { semanal:"Semanal", quinzenal:"Quinzenal", mensal:"Mensal", avulsa:"Avulsa" };

function Icon({ name, size=16, color, style }) {
  const map = { Plus:lucide.Plus, Check:lucide.Check, Clock:lucide.Clock, Truck:lucide.Truck, PawPrint:lucide.PawPrint, MapPin:lucide.MapPin, X:lucide.X, Search:lucide.Search, ChevronLeft:lucide.ChevronLeft, ChevronRight:lucide.ChevronRight, Trash2:lucide.Trash2, Edit3:lucide.Edit3, Package:lucide.Package, ArrowDownCircle:lucide.ArrowDownCircle, ArrowUpCircle:lucide.ArrowUpCircle, AlertTriangle:lucide.AlertTriangle, LogOut:lucide.LogOut, Eye:lucide.Eye, EyeOff:lucide.EyeOff };
  const Comp = map[name];
  if (!Comp) return null;
  return React.createElement(Comp, { size, color, style, strokeWidth: 2.5 });
}

            <input type="email" style={{ border:"1px solid #E8DDD0", borderRadius:11, padding:"12px 14px", fontSize:15, background:"#FFF", color:"#3E332A" }} placeholder="seu@email.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} />

            <div style={{ position:"relative" }}>
              <input type={showPass?"text":"password"} style={{ border:"1px solid #E8DDD0", borderRadius:11, padding:"12px 44px 12px 14px", fontSize:15, background:"#FFF", color:"#3E332A", width:"100%" }} placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} />
              <button onClick={()=>setShowPass(s=>!s)} style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", padding:0, display:"flex", alignItems:"center" }}>
                <Icon name={showPass?"EyeOff":"Eye"} size={18} color="#A89A8C" />

          <button onClick={handleLogin} disabled={loading} style={{ background:loading?"#D9CBBC":"#B8825A", color:"#FFF7EF", border:"none", borderRadius:11, padding:"14px", fontSize:15.5, fontWeight:700, marginTop:4 }}>
            {loading?"Entrando…":"Entrar"}

function App() {
  const [session, setSession] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  useEffect(() => {
    const saved = localStorage.getItem("obentopet_token");
    if (saved) {
      auth.getUser(saved).then(user => {
        if (user) setSession({ token: saved, user });
        setAuthChecked(true);
      }).catch(() => setAuthChecked(true));
    } else { setAuthChecked(true); }
  }, []);
  const handleLogin = (token, user) => {
    localStorage.setItem("obentopet_token", token);
    setSession({ token, user });
  };
  const handleLogout = async () => {
    if (session) await auth.signOut(session.token);
    localStorage.removeItem("obentopet_token");
    setSession(null);
  };
  if (!authChecked) return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", background:"#FDF8F2", gap:12 }}>
      <Icon name="PawPrint" size={32} color="#B8825A" />
      <p style={{ color:"#A89A8C", fontSize:14, margin:0 }}>Carregando…</p>
    </div>
  );
  if (!session) return <LoginScreen onLogin={handleLogin} />;
  return <MainApp token={session.token} user={session.user} onLogout={handleLogout} />;
}

function MainApp({ token, user, onLogout }) {
  const db = useMemo(() => makeDb(token), [token]);
  const [clients, setClients] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [statusLog, setStatusLog] = useState({});
  const [view, setView] = useState("hoje");
  const [weekOffset, setWeekOffset] = useState(0);
  const [search, setSearch] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [editingClient, setEditingClient] = useState(null);
  const [subscriberStock, setSubscriberStock] = useState({});
  const [subscriberStockLog, setSubscriberStockLog] = useState({});
  const [shelfProducts, setShelfProducts] = useState([]);
  const [shelfStockLog, setShelfStockLog] = useState({});
  const [deliveryDeduction, setDeliveryDeduction] = useState({});

  useEffect(() => {
    (async () => {
      const cls = await db.get("clients", "?select=*&order=tutor.asc");
      setClients(cls.map(r => ({ id:r.id, tutor:r.tutor, dog:r.dog, address:r.address, frequency:r.frequency, nextDate:r.next_date, units:r.units, notes:r.notes||"" })));
      const sl = await db.get("status_log", "?select=*");
      const slMap = {}; sl.forEach(r => { slMap[r.key] = r.status; }); setStatusLog(slMap);
      const ss = await db.get("subscriber_stock", "?select=*");
      const ssMap = {}; ss.forEach(r => { ssMap[r.client_id] = r.balance; }); setSubscriberStock(ssMap);
      const ssl = await db.get("subscriber_stock_log", "?select=*&order=ts.desc");
      const sslMap = {}; ssl.forEach(r => { if(!sslMap[r.client_id])sslMap[r.client_id]=[]; sslMap[r.client_id].push({date:r.date,amount:r.amount,reason:r.reason,ts:r.ts}); }); setSubscriberStockLog(sslMap);
      const sp = await db.get("shelf_products", "?select=*&order=name.asc");
      setShelfProducts(sp.map(r => ({ id:r.id, name:r.name, balance:r.balance })));
      const spl = await db.get("shelf_stock_log", "?select=*&order=ts.desc");
      const splMap = {}; spl.forEach(r => { if(!splMap[r.product_id])splMap[r.product_id]=[]; splMap[r.product_id].push({date:r.date,amount:r.amount,reason:r.reason,ts:r.ts}); }); setShelfStockLog(splMap);
      const dd = await db.get("delivery_deduction", "?select=*");
      const ddMap = {}; dd.forEach(r => { ddMap[r.key]={productId:r.product_id,amount:r.amount}; }); setDeliveryDeduction(ddMap);
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    clients.filter(c=>c.frequency!=="avulsa").forEach(c => {
      if (!(c.id in subscriberStock)) {
        db.upsert("subscriber_stock", { client_id: c.id, balance: 0 });
        setSubscriberStock(prev => ({ ...prev, [c.id]: 0 }));
      }
    });
  }, [clients, loaded]);

  const getStatus = (clientId, date) => statusLog[`${clientId}|${date}`] || "preparando";

  const setStatus = (clientId, date, status, deduction) => {
    const key = `${clientId}|${date}`;
    const wasEntregue = getStatus(clientId, date) === "entregue";
    const willBeEntregue = status === "entregue";
    const client = clients.find(c => c.id === clientId);
    setStatusLog(prev => ({ ...prev, [key]: status }));
    db.upsert("status_log", { key, status });
    if (!client) return;
    if (client.frequency === "avulsa") {
      if (!wasEntregue && willBeEntregue && deduction?.productId) {
        applyShelfDelta(deduction.productId, -deduction.amount, date, "Entrega avulsa");
        setDeliveryDeduction(prev => ({ ...prev, [key]: deduction }));
        db.upsert("delivery_deduction", { key, product_id: deduction.productId, amount: deduction.amount });
      }
      if (wasEntregue && !willBeEntregue) {
        const prev = deliveryDeduction[key];
        if (prev?.productId) applyShelfDelta(prev.productId, prev.amount, date, "Estorno (status revertido)");
        setDeliveryDeduction(p => { const n={...p}; delete n[key]; return n; });
        db.delete("delivery_deduction", `key=eq.${encodeURIComponent(key)}`);
      }
    } else {
      const amount = client.units || 0;
      if (!wasEntregue && willBeEntregue) applySubscriberDelta(clientId, -amount, date, "Entrega realizada");
      if (wasEntregue && !willBeEntregue) applySubscriberDelta(clientId, amount, date, "Estorno (status revertido)");
    }
  };

  const applySubscriberDelta = (clientId, delta, date, reason) => {
    setSubscriberStock(prev => {
      const newBal = (prev[clientId]||0) + delta;
      db.upsert("subscriber_stock", { client_id: clientId, balance: newBal });
      return { ...prev, [clientId]: newBal };
    });
    const entry = { client_id: clientId, date, amount: delta, reason, ts: Date.now() };
    db.insert("subscriber_stock_log", entry);
    setSubscriberStockLog(prev => {
      const entries = prev[clientId] ? [...prev[clientId]] : [];
      entries.unshift({ date, amount: delta, reason, ts: entry.ts });
      return { ...prev, [clientId]: entries.slice(0, 100) };
    });
  };

  const applyShelfDelta = (productId, delta, date, reason) => {
    setShelfProducts(prev => prev.map(p => {
      if (p.id !== productId) return p;
      const newBal = p.balance + delta;
      db.upsert("shelf_products", { id: p.id, name: p.name, balance: newBal });
      return { ...p, balance: newBal };
    }));
    const entry = { product_id: productId, date, amount: delta, reason, ts: Date.now() };
    db.insert("shelf_stock_log", entry);
    setShelfStockLog(prev => {
      const entries = prev[productId] ? [...prev[productId]] : [];
      entries.unshift({ date, amount: delta, reason, ts: entry.ts });
      return { ...prev, [productId]: entries.slice(0, 100) };
    });
  };

  const addSubscriberProduction = (clientId, amount) => { if (amount > 0) applySubscriberDelta(clientId, amount, todayISO(), "Produção da semana"); };
  const addShelfProduct = (name) => { const id="p"+Date.now(); db.upsert("shelf_products",{id,name,balance:0}); setShelfProducts(prev=>[...prev,{id,name,balance:0}]); };
  const addShelfStockEntry = (productId, amount) => { if (amount > 0) applyShelfDelta(productId, amount, todayISO(), "Entrada de estoque"); };
  const deleteShelfProduct = (productId) => { db.delete("shelf_products",`id=eq.${productId}`); setShelfProducts(prev=>prev.filter(p=>p.id!==productId)); };

  const saveClient = (data) => {
    if (editingClient) {
      const updated = { ...editingClient, ...data };
      db.upsert("clients", { id:updated.id, tutor:updated.tutor, dog:updated.dog, address:updated.address, frequency:updated.frequency, next_date:updated.nextDate, units:updated.units, notes:updated.notes });
      setClients(prev => prev.map(c => c.id===editingClient.id ? updated : c));
    } else {
      const id = "c"+Date.now();
      const newClient = { ...data, id };
      db.upsert("clients", { id, tutor:data.tutor, dog:data.dog, address:data.address, frequency:data.frequency, next_date:data.nextDate, units:data.units, notes:data.notes });
      setClients(prev => [...prev, newClient]);
    }
    setShowForm(false); setEditingClient(null);
  };

  const deleteClient = (id) => { db.delete("clients",`id=eq.${id}`); setClients(prev=>prev.filter(c=>c.id!==id)); };

  const weekStart = useMemo(() => {
    const d = new Date(); d.setDate(d.getDate() + weekOffset*7); d.setDate(d.getDate()-d.getDay()); return dateToISO(d);
  }, [weekOffset]);
  const weekDays = useMemo(() => Array.from({length:7},(_,i)=>addDays(weekStart,i)), [weekStart]);
  const todayDeliveries = useMemo(() => {
    const t = todayISO(); const items = [];
    clients.forEach(c => { getOccurrencesInRange(c,t,t).forEach(()=>items.push({client:c,date:t})); });
    return items.sort((a,b)=>a.client.tutor.localeCompare(b.client.tutor));
  }, [clients]);
  const weekDeliveries = useMemo(() => {
    const map = {}; weekDays.forEach(d=>(map[d]=[]));
    clients.forEach(c => { getOccurrencesInRange(c,weekDays[0],weekDays[6]).forEach(d=>{if(map[d])map[d].push(c);}); });
    Object.keys(map).forEach(d=>map[d].sort((a,b)=>a.tutor.localeCompare(b.tutor)));
    return map;
  }, [clients, weekDays]);
  const filteredClients = useMemo(() => {
    const q = search.trim().toLowerCase();
    if (!q) return clients;
    return clients.filter(c=>c.tutor.toLowerCase().includes(q)||c.dog.toLowerCase().includes(q)||c.address.toLowerCase().includes(q));
  }, [clients, search]);

  if (!loaded) return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", background:"#FDF8F2", gap:12 }}>
      <Icon name="PawPrint" size={32} color="#B8825A" /><p style={{ color:"#A89A8C", fontSize:14, margin:0 }}>Carregando dados…</p>
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", background:"#FDF8F2", color:"#3E332A", paddingBottom:40 }}>
      <header style={{ background:"#3E332A", position:"sticky", top:0, zIndex:10 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"18px 20px 14px", flexWrap:"wrap", gap:12 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:36, height:36, borderRadius:10, background:"#B8825A", display:"flex", alignItems:"center", justifyContent:"center" }}><Icon name="PawPrint" size={20} color="#FBF1E8" /></div>
            <div><h1 style={{ margin:0, fontSize:18, fontWeight:700, color:"#FBF1E8" }}>ObentōPet</h1><p style={{ margin:0, fontSize:12, color:"#C9BBA8", fontWeight:500 }}>Controle de Entregas</p></div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <button onClick={()=>{setEditingClient(null);setShowForm(true);}} style={{ display:"flex", alignItems:"center", gap:6, background:"#B8825A", color:"#FFF7EF", border:"none", borderRadius:10, padding:"9px 14px", fontSize:13.5, fontWeight:600 }}><Icon name="Plus" size={18} color="#FFF7EF" /> Novo cliente</button>
            <button onClick={onLogout} title="Sair" style={{ width:36, height:36, background:"rgba(255,255,255,0.08)", border:"none", borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center" }}><Icon name="LogOut" size={16} color="#C9BBA8" /></button>
          </div>
        </div>
        <nav style={{ display:"flex", gap:4, padding:"0 16px" }}>
          {[["hoje","Hoje"],["semana","Semana"],["clientes","Clientes"],["estoque","Estoque"]].map(([key,label])=>(
            <button key={key} onClick={()=>setView(key)} style={{ background:"transparent", border:"none", color:view===key?"#FBF1E8":"#9C8E7E", padding:"10px 14px", fontSize:14, fontWeight:600, borderBottom:view===key?"2px solid #B8825A":"2px solid transparent" }}>{label}</button>
          ))}
        </nav>
      </header>
      <main style={{ maxWidth:640, margin:"0 auto", padding:"20px 16px" }}>
        {view==="hoje"&&<TodayView items={todayDeliveries} getStatus={getStatus} setStatus={setStatus} shelfProducts={shelfProducts} />}
        {view==="semana"&&<WeekView weekDays={weekDays} weekDeliveries={weekDeliveries} weekOffset={weekOffset} setWeekOffset={setWeekOffset} getStatus={getStatus} setStatus={setStatus} shelfProducts={shelfProducts} />}
        {view==="clientes"&&<ClientsView clients={filteredClients} search={search} setSearch={setSearch} onEdit={c=>{setEditingClient(c);setShowForm(true);}} onDelete={deleteClient} />}
        {view==="estoque"&&<StockView clients={clients} subscriberStock={subscriberStock} subscriberStockLog={subscriberStockLog} shelfProducts={shelfProducts} shelfStockLog={shelfStockLog} onAddSubscriberProduction={addSubscriberProduction} onAddShelfProduct={addShelfProduct} onAddShelfStockEntry={addShelfStockEntry} onDeleteShelfProduct={deleteShelfProduct} />}
      </main>
      {showForm&&<ClientFormModal initial={editingClient} onClose={()=>{setShowForm(false);setEditingClient(null);}} onSave={saveClient} />}
    </div>
  );
}

function TodayView({ items, getStatus, setStatus, shelfProducts }) {
  const t = todayISO();
  const d = new Date(t + "T00:00:00");
  const label = `${weekdayNames[d.getDay()]}, ${d.getDate()} de ${d.toLocaleDateString("pt-BR",{month:"long"})}`;
  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>

}

function WeekView({ weekDays, weekDeliveries, weekOffset, setWeekOffset, getStatus, setStatus, shelfProducts }) {
  const [activeDay, setActiveDay] = useState(null);
  const t = todayISO();
  const activeDate = activeDay||(weekDays.includes(t)?t:weekDays[0]);
  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:14, marginBottom:14 }}>
        <button onClick={()=>setWeekOffset(w=>w-1)} style={{ background:"#FFF", border:"1px solid #EFE4D6", borderRadius:8, width:32, height:32, display:"flex", alignItems:"center", justifyContent:"center" }}><Icon name="ChevronLeft" size={18} color="#3E332A" /></button>
        <span style={{ fontSize:14, fontWeight:700, color:"#3E332A", minWidth:110, textAlign:"center" }}>{formatDateBR(weekDays[0])} – {formatDateBR(weekDays[6])}</span>
        <button onClick={()=>setWeekOffset(w=>w+1)} style={{ background:"#FFF", border:"1px solid #EFE4D6", borderRadius:8, width:32, height:32, display:"flex", alignItems:"center", justifyContent:"center" }}><Icon name="ChevronRight" size={18} color="#3E332A" /></button>
      </div>
      <div style={{ display:"flex", gap:6, overflowX:"auto", paddingBottom:2 }}>
        {weekDays.map((d,i)=>{
          const count=weekDeliveries[d]?.length||0,isToday=d===t,isActive=d===activeDate;
          return <button key={d} onClick={()=>setActiveDay(d)} style={{ flex:"1 0 auto", minWidth:44, background:isActive?"#3E332A":"#FFF", border:isToday&&!isActive?"1.5px solid #B8825A":"1px solid #EFE4D6", borderRadius:11, padding:"8px 4px 10px", display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
            <span style={{ fontSize:10, fontWeight:700, color:"#9C8E7E" }}>{weekdayShort[i]}</span>
            <span style={{ fontSize:15, fontWeight:700, color:isActive?"#FBF1E8":"#3E332A" }}>{d.split("-")[2]}</span>
            {count>0&&<span style={{ width:5, height:5, borderRadius:3, background:isActive?"#FBF1E8":"#B8825A", marginTop:1 }} />}
          </button>;
        })}
      </div>
      <div style={{ marginTop:20 }}>
        {(weekDeliveries[activeDate]||[]).length===0?<EmptyState text="Nenhuma entrega marcada para este dia." />:(
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            {weekDeliveries[activeDate].map(client=><DeliveryCard key={client.id+activeDate} client={client} status={getStatus(client.id,activeDate)} onStatusChange={(s,ded)=>setStatus(client.id,activeDate,s,ded)} shelfProducts={shelfProducts} />)}
          </div>
        )}
      </div>
    </div>
  );
}

function DeliveryCard({ client, status, onStatusChange, shelfProducts }) {
  const [pickerOpen, setPickerOpen] = useState(false);
  const [selectedProduct, setSelectedProduct] = useState("");
  const [selectedAmount, setSelectedAmount] = useState(String(client.units||1));
  const isAvulsa = client.frequency==="avulsa";
  const handleStatusClick = (key) => { if(key==="entregue"&&isAvulsa&&status!=="entregue"){setPickerOpen(true);return;} onStatusChange(key); };
  const confirmAvulsaDelivery = () => { const amount=parseInt(selectedAmount,10); if(!selectedProduct||!amount||amount<1)return; onStatusChange("entregue",{productId:selectedProduct,amount}); setPickerOpen(false); };
  return (
    <div style={{ background:"#FFF", border:"1px solid #EFE4D6", borderRadius:14, padding:14 }}>
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:8 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ width:32, height:32, borderRadius:9, background:"#FBF1E8", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}><Icon name="PawPrint" size={14} color="#B8825A" /></div>
          <div><div style={{ fontSize:15.5, fontWeight:700, color:"#3E332A" }}>{client.dog}</div><div style={{ fontSize:13, color:"#8A7A6C", marginTop:1 }}>{client.tutor}</div></div>
        </div>
        <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:5 }}>
          <span style={{ fontSize:11.5, fontWeight:600, color:"#8A6A48", background:"#F6EEE3", padding:"4px 9px", borderRadius:8, whiteSpace:"nowrap" }}>{frequencyLabel[client.frequency]}</span>
          {client.units?<span style={{ fontSize:11.5, fontWeight:700, color:"#3E7CB1", background:"#EAF2F8", padding:"4px 9px", borderRadius:8, whiteSpace:"nowrap" }}>{client.units} {client.units===1?"unidade":"unidades"}</span>:null}

        <div style={{ marginTop:12, background:"#FBF8F4", border:"1px solid #EFE4D6", borderRadius:11, padding:12 }}>
          <p style={{ fontSize:12.5, fontWeight:600, color:"#8A7A6C", margin:"0 0 8px" }}>Qual produto sai do estoque?</p>
          {shelfProducts.length===0?<p style={{ fontSize:12.5, color:"#C0594B", margin:0 }}>Nenhum produto cadastrado em Estoque ainda.</p>:(
            <select style={{ border:"1px solid #E8DDD0", borderRadius:10, padding:"10px 12px", fontSize:14.5, background:"#FFF", color:"#3E332A", width:"100%" }} value={selectedProduct} onChange={e=>setSelectedProduct(e.target.value)}>
              <option value="">Selecione um produto…</option>
              {shelfProducts.map(p=><option key={p.id} value={p.id}>{p.name} (saldo: {p.balance})</option>)}
            </select>
          )}
          <div style={{ display:"flex", gap:8, marginTop:8 }}>
            <input type="number" min="1" style={{ border:"1px solid #E8DDD0", borderRadius:10, padding:"10px 12px", fontSize:14.5, background:"#FFF", color:"#3E332A", flex:1 }} value={selectedAmount} onChange={e=>setSelectedAmount(e.target.value)} placeholder="Qtd" />
            <button style={{ flex:1, background:"#B8825A", color:"#FFF7EF", border:"none", borderRadius:9, padding:"9px 10px", fontSize:13, fontWeight:700 }} onClick={confirmAvulsaDelivery} disabled={!selectedProduct}>Confirmar</button>

          </div>
        </div>

        <div style={{ display:"flex", gap:6, marginTop:12 }}>

            const active=status===key;
            return <button key={key} onClick={()=>handleStatusClick(key)} style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:5, border:`1.5px solid ${active?conf.color:"#E8DDD0"}`, borderRadius:9, padding:"8px 6px", fontSize:12, fontWeight:600, background:active?conf.color:"#FFF7EF", color:active?"#FFF7EF":"#8A7A6C" }}><Icon name={conf.icon} size={13} color={active?"#FFF7EF":"#8A7A6C"} />{conf.label}</button>;
          })}
        </div>
      )}

  );
}

function StockView({ clients, subscriberStock, subscriberStockLog, shelfProducts, shelfStockLog, onAddSubscriberProduction, onAddShelfProduct, onAddShelfStockEntry, onDeleteShelfProduct }) {

  const [productionInputs, setProductionInputs] = useState({});
  const [expandedProduct, setExpandedProduct] = useState(null);

    <div>

      <div style={{ display:"flex", gap:6, marginBottom:16, background:"#F1E6D8", padding:4, borderRadius:12 }}>

          {subscribers.map(c=>{
            const balance=subscriberStock[c.id]??0,isLow=balance<=(c.units||0),log=subscriberStockLog[c.id]||[],expanded=expandedClient===c.id;
            return (
              <div key={c.id} style={{ background:"#FFF", border:"1px solid #EFE4D6", borderRadius:14, padding:14 }}>
                <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:8 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10 }}><div style={{ width:32, height:32, borderRadius:9, background:"#FBF1E8", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}><Icon name="PawPrint" size={14} color="#B8825A" /></div><div><div style={{ fontSize:15.5, fontWeight:700, color:"#3E332A" }}>{c.dog}</div><div style={{ fontSize:13, color:"#8A7A6C", marginTop:1 }}>{c.tutor}</div></div></div>
                  <div style={{ textAlign:"right" }}><div style={{ fontSize:22, fontWeight:800, lineHeight:1, color:isLow?"#C0594B":"#3E332A" }}>{balance}</div><div style={{ fontSize:10.5, color:"#A89A8C", marginTop:2, fontWeight:600 }}>em estoque</div></div>
                </div>
                {isLow&&<div style={{ display:"flex", alignItems:"center", gap:6, background:"#FBEAE6", color:"#A8412F", fontSize:12, fontWeight:600, padding:"7px 10px", borderRadius:9, marginTop:10 }}><Icon name="AlertTriangle" size={13} color="#C0594B" /><span>Saldo baixo para a próxima entrega ({c.units||0} un.)</span></div>}
                <div style={{ display:"flex", gap:8, marginTop:12 }}>
                  <input type="number" min="1" style={{ border:"1px solid #E8DDD0", borderRadius:10, padding:"10px 12px", fontSize:14.5, background:"#FFF", color:"#3E332A", flex:1 }} placeholder="Unidades produzidas" value={productionInputs[c.id]||""} onChange={e=>setProductionInputs(p=>({...p,[c.id]:e.target.value}))} />
                  <button style={{ display:"flex", alignItems:"center", gap:4, background:"#3E332A", color:"#FBF1E8", border:"none", borderRadius:10, padding:"0 14px", fontSize:12.5, fontWeight:600, whiteSpace:"nowrap" }} onClick={()=>{const a=parseInt(productionInputs[c.id],10);if(a>0){onAddSubscriberProduction(c.id,a);setProductionInputs(p=>({...p,[c.id]:""}));}}}><Icon name="Plus" size={14} color="#FBF1E8" />Adicionar</button>
                </div>
                <button style={{ background:"transparent", border:"none", color:"#B8825A", fontSize:12.5, fontWeight:600, padding:"10px 0 0", textAlign:"left" }} onClick={()=>setExpandedClient(expanded?null:c.id)}>{expanded?"Ocultar histórico":`Ver histórico (${log.length})`}</button>

              <div style={{ display:"flex", gap:8, marginTop:8 }}>
                <button style={{ flex:1, background:"#B8825A", color:"#FFF7EF", border:"none", borderRadius:9, padding:"9px 10px", fontSize:13, fontWeight:700 }} onClick={()=>{if(newProductName.trim()){onAddShelfProduct(newProductName.trim());setNewProductName("");setShowNewProduct(false);}}}>Salvar</button>
                <button style={{ background:"#EFE4D6", color:"#8A7A6C", border:"none", borderRadius:9, padding:"9px 14px", fontSize:13, fontWeight:600 }} onClick={()=>setShowNewProduct(false)}>Cancelar</button>

          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            {shelfProducts.map(p=>{
              const log=shelfStockLog[p.id]||[],expanded=expandedProduct===p.id,isLow=p.balance<=0;
              return (
                <div key={p.id} style={{ background:"#FFF", border:"1px solid #EFE4D6", borderRadius:14, padding:14 }}>
                  <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:8 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:10 }}><div style={{ width:32, height:32, borderRadius:9, background:"#FBF1E8", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}><Icon name="Package" size={14} color="#B8825A" /></div><div style={{ fontSize:15.5, fontWeight:700, color:"#3E332A" }}>{p.name}</div></div>
                    <div style={{ textAlign:"right" }}><div style={{ fontSize:22, fontWeight:800, lineHeight:1, color:isLow?"#C0594B":"#3E332A" }}>{p.balance}</div><div style={{ fontSize:10.5, color:"#A89A8C", marginTop:2, fontWeight:600 }}>em estoque</div></div>
                  </div>
                  {isLow&&<div style={{ display:"flex", alignItems:"center", gap:6, background:"#FBEAE6", color:"#A8412F", fontSize:12, fontWeight:600, padding:"7px 10px", borderRadius:9, marginTop:10 }}><Icon name="AlertTriangle" size={13} color="#C0594B" /><span>Sem saldo disponível</span></div>}
                  <div style={{ display:"flex", gap:8, marginTop:12 }}>
                    <input type="number" min="1" style={{ border:"1px solid #E8DDD0", borderRadius:10, padding:"10px 12px", fontSize:14.5, background:"#FFF", color:"#3E332A", flex:1 }} placeholder="Unidades a adicionar" value={stockInputs[p.id]||""} onChange={e=>setStockInputs(prev=>({...prev,[p.id]:e.target.value}))} />
                    <button style={{ display:"flex", alignItems:"center", gap:4, background:"#3E332A", color:"#FBF1E8", border:"none", borderRadius:10, padding:"0 14px", fontSize:12.5, fontWeight:600, whiteSpace:"nowrap" }} onClick={()=>{const a=parseInt(stockInputs[p.id],10);if(a>0){onAddShelfStockEntry(p.id,a);setStockInputs(prev=>({...prev,[p.id]:""}));}}}><Icon name="Plus" size={14} color="#FBF1E8" />Adicionar</button>
                  </div>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:8 }}>
                    <button style={{ background:"transparent", border:"none", color:"#B8825A", fontSize:12.5, fontWeight:600, padding:"10px 0 0", textAlign:"left" }} onClick={()=>setExpandedProduct(expanded?null:p.id)}>{expanded?"Ocultar histórico":`Ver histórico (${log.length})`}</button>
                    <button style={{ width:26, height:26, borderRadius:7, border:"1px solid #EFE4D6", background:"#FBF8F4", display:"flex", alignItems:"center", justifyContent:"center" }} onClick={()=>onDeleteShelfProduct(p.id)}><Icon name="Trash2" size={13} color="#A89A8C" /></button>

                  {expanded&&<div style={{ marginTop:8, borderTop:"1px solid #F1E6D8", paddingTop:8, display:"flex", flexDirection:"column", gap:8 }}>{log.length===0?<p style={{ fontSize:12.5, color:"#A89A8C", margin:0 }}>Sem movimentações ainda.</p>:log.map((e,i)=><HistoryRow key={i} entry={e} />)}</div>}
                </div>
              );
            })}
          </div>
        )}
      </>)}
    </div>
  );
}

function HistoryRow({ entry }) {
  const positive=entry.amount>0;
  return (
    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
      <Icon name={positive?"ArrowUpCircle":"ArrowDownCircle"} size={15} color={positive?"#5C8A5C":"#C0594B"} style={{ flexShrink:0 }} />
      <div style={{ flex:1 }}><div style={{ fontSize:12.5, fontWeight:600, color:"#3E332A" }}>{entry.reason}</div><div style={{ fontSize:11, color:"#A89A8C" }}>{formatDateBR(entry.date)}</div></div>
      <div style={{ fontSize:13, fontWeight:700, color:positive?"#5C8A5C":"#C0594B" }}>{positive?"+":""}{entry.amount}</div>
    </div>
  );
}

          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            <label style={{ fontSize:12.5, fontWeight:600, color:"#8A7A6C" }}>Frequência</label>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
              {Object.entries(frequencyLabel).map(([key,label])=>(
                <button key={key} type="button" onClick={()=>setFrequency(key)} style={{ border:frequency===key?"1.5px solid #B8825A":"1.5px solid #E8DDD0", borderRadius:10, padding:"9px 8px", fontSize:13.5, fontWeight:600, color:frequency===key?"#8A6A48":"#8A7A6C", background:frequency===key?"#FBF1E8":"#FFF" }}>{label}</button>
              ))}
            </div>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}><label style={{ fontSize:12.5, fontWeight:600, color:"#8A7A6C" }}>{frequency==="avulsa"?"Data da entrega":"Próxima entrega"}</label><input type="date" style={{ border:"1px solid #E8DDD0", borderRadius:10, padding:"10px 12px", fontSize:14.5, background:"#FFF", color:"#3E332A" }} value={nextDate} onChange={e=>setNextDate(e.target.value)} /></div>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}><label style={{ fontSize:12.5, fontWeight:600, color:"#8A7A6C" }}>Quantidade de unidades</label><input type="number" min="1" style={{ border:"1px solid #E8DDD0", borderRadius:10, padding:"10px 12px", fontSize:14.5, background:"#FFF", color:"#3E332A" }} value={units} onChange={e=>setUnits(e.target.value)} placeholder="Ex: 4" /></div>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}><label style={{ fontSize:12.5, fontWeight:600, color:"#8A7A6C" }}>Observações (opcional)</label><textarea style={{ border:"1px solid #E8DDD0", borderRadius:10, padding:"10px 12px", fontSize:14.5, background:"#FFF", color:"#3E332A", minHeight:60, resize:"vertical", fontFamily:"inherit" }} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Ex: portaria pede documento" /></div>
          {error&&<p style={{ color:"#C0594B", fontSize:13, margin:0 }}>{error}</p>}
          <button style={{ background:"#B8825A", color:"#FFF7EF", border:"none", borderRadius:11, padding:"13px", fontSize:15, fontWeight:700, marginTop:4 }} onClick={handleSubmit}>{initial?"Salvar alterações":"Adicionar cliente"}</button>
        </div>
      </div>
    </div>
  );
}

function EmptyState({ text }) {
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:10, padding:"48px 20px", textAlign:"center" }}>
      <Icon name="PawPrint" size={26} color="#D9CBBC" /><p style={{ color:"#A89A8C", fontSize:14, margin:0 }}>{text}</p>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
